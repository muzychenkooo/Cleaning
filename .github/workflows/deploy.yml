name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

# Ссылка для просмотра и отправки заказчику (подставьте свой репозиторий)
env:
  SITE_URL: https://muzychenkooo.github.io/Cleaning/

jobs:
  # Шаг 1: сборка статики
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          NODE_ENV: "production"

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: out/

  # Шаг 2: деплой в цепочке после успешной сборки
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true

      - name: Ссылка на сайт
        run: |
          echo "=============================================="
          echo "Сайт выгружен и доступен по ссылке:"
          echo "${{ env.SITE_URL }}"
          echo "=============================================="
          echo "Скопируйте ссылку и отправьте заказчику для просмотра."
          echo "::notice title=Сайт опубликован::Ссылка для просмотра и заказчика: ${{ env.SITE_URL }}"
