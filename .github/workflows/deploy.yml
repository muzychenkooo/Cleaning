# Деплой на GitHub Pages через источник "GitHub Actions" (без ветки gh-pages)
# В настройках репозитория: Settings → Pages → Source: GitHub Actions

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Шаг 1: сборка статики
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          NODE_ENV: "production"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: out/

  # Шаг 2: деплой (только после успешной сборки)
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Ссылка на сайт
        run: |
          echo "=============================================="
          echo "Сайт выгружен. Ссылка для просмотра и заказчика:"
          echo "${{ steps.deployment.outputs.page_url }}"
          echo "=============================================="
          echo "::notice title=Сайт опубликован::Ссылка: ${{ steps.deployment.outputs.page_url }}"
